version: 2

project_name: terrapulse-agent

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: agent
    main: ./agent/cmd/main.go
    binary: terrapulse-agent
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuildDate={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: agent
    builds: [agent]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - docs/

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

signs:
  - artifacts: checksum
    cmd: cosign
    args:
      - sign-blob
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    output: true

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"

release:
  github:
    owner: yourusername
    name: terrapulse
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./policies/bundle.tar.gz

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
  groups:
    - title: "🚀 Features"
      regexp: "^feat"
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
    - title: "⚡ Performance"
      regexp: "^perf"
    - title: "🔒 Security"
      regexp: "^sec"
