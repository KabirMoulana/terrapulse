name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Agent (Go) ────────────────────────────────────────────────────────────
  test-agent:
    name: Test Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -coverprofile=coverage.out
      - uses: golangci/golangci-lint-action@v4

  # ── Policy Engine (OPA Rego) ──────────────────────────────────────────────
  test-policies:
    name: Test OPA Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -L -o opa https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/

      - name: OPA format check
        run: opa fmt --diff policies/

      - name: Run policy unit tests
        run: opa test policies/ -v --coverage

      - name: OPA policy bundle build
        run: |
          opa build policies/ -o policies/bundle.tar.gz
          echo "Bundle size: $(du -sh policies/bundle.tar.gz)"

      - name: Upload policy bundle
        uses: actions/upload-artifact@v4
        with:
          name: opa-bundle
          path: policies/bundle.tar.gz

  # ── Terraform Plan ────────────────────────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: [test-agent, test-policies]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: infra/terraform/aws

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: us-east-1

      - run: terraform init
      - run: terraform validate
      - run: terraform fmt -check -recursive

      - name: tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra/terraform/aws

      - name: Terraform plan
        run: |
          terraform plan -out=tfplan \
            -var="environment=${{ github.ref == 'refs/heads/main' && 'staging' || 'dev' }}" \
            2>&1 | tee plan.txt

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('infra/terraform/aws/plan.txt', 'utf8');
            const truncated = plan.length > 65000 ? plan.substring(0, 65000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Build Agent Binaries (goreleaser) ─────────────────────────────────────
  release-agent:
    name: Release Agent Binaries
    runs-on: ubuntu-latest
    needs: [test-agent, test-policies, terraform-plan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # goreleaser needs full git history

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install cosign (for binary signing)
        uses: sigstore/cosign-installer@v3

      - name: Install goreleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          install-only: true

      - name: Run goreleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COSIGN_EXPERIMENTAL: "1"

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Control Plane
    runs-on: ubuntu-latest
    needs: release-agent
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_STAGING_ROLE_ARN }}
          aws-region: us-east-1

      - run: aws eks update-kubeconfig --name terrapulse-staging --region us-east-1

      - name: Upload OPA policy bundle to S3
        run: |
          aws s3 cp policies/bundle.tar.gz \
            s3://terrapulse-staging-policies/bundle-${{ github.sha }}.tar.gz
          aws s3 cp policies/bundle.tar.gz \
            s3://terrapulse-staging-policies/bundle-latest.tar.gz

      - name: Deploy via Helm
        run: |
          helm upgrade --install terrapulse deploy/helm/terrapulse \
            --namespace terrapulse \
            --create-namespace \
            --set global.imageTag=${{ github.sha }} \
            --set policyBundle.s3Key=bundle-${{ github.sha }}.tar.gz \
            --values deploy/helm/terrapulse/values-staging.yaml \
            --wait --timeout 10m
